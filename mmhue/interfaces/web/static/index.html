<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d0f14">
<title>mmhue</title>
<style>
  :root {
    --bg: #0d0f14;
    --panel: #171a22;
    --panel-2: #1f2430;
    --line: #2a3040;
    --text: #e8eaf0;
    --muted: #8b93a7;
    --accent: #ffc34d;
    --danger: #ff5f56;
    --radius: 14px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; padding: 16px 16px 48px;
    background: var(--bg); color: var(--text);
    font: 15px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    max-width: 640px; margin-inline: auto;
  }
  header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; }
  h1 { font-size: 20px; margin: 0; font-weight: 650; letter-spacing: .2px; }
  .sub { color: var(--muted); font-size: 13px; }
  h2 {
    font-size: 12px; text-transform: uppercase; letter-spacing: .09em;
    color: var(--muted); margin: 26px 0 10px; font-weight: 600;
  }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
  .row {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 14px; border-bottom: 1px solid var(--line);
  }
  .row:last-child { border-bottom: 0; }
  .row .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .meta { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #394052; flex: none; }
  .dot.on { background: var(--accent); box-shadow: 0 0 9px var(--accent); }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(96px, 1fr)); gap: 8px; }
  button {
    font: inherit; color: var(--text); background: var(--panel-2);
    border: 1px solid var(--line); border-radius: 10px;
    padding: 11px 12px; cursor: pointer; transition: transform .06s ease, background .15s ease;
  }
  button:active { transform: scale(.97); }
  button.primary { background: var(--accent); color: #1a1400; border-color: transparent; font-weight: 600; }
  button.danger  { background: var(--danger); color: #fff; border-color: transparent; font-weight: 600; }
  button.wide { width: 100%; }
  button.pill { padding: 7px 10px; font-size: 13px; border-radius: 999px; }
  button.active { outline: 2px solid var(--accent); outline-offset: -2px; }
  .controls { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 14px 13px; }
  .swatch { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--line); padding: 0; }
  details > summary { cursor: pointer; list-style: none; }
  details > summary::-webkit-details-marker { display: none; }
  #banner {
    display: none; margin-bottom: 14px; padding: 12px 14px; border-radius: var(--radius);
    background: #2a2110; border: 1px solid var(--accent); color: var(--accent);
    align-items: center; gap: 12px;
  }
  #banner.show { display: flex; }
  #banner .name { flex: 1; font-weight: 600; }
  #err {
    display: none; margin-bottom: 12px; padding: 10px 12px; border-radius: 10px;
    background: #2a1414; border: 1px solid var(--danger); color: #ffb4b0; font-size: 13px;
  }
  #err.show { display: block; }
</style>
</head>
<body>

<header>
  <h1>mmhue</h1>
  <span class="sub" id="summary">…</span>
</header>

<div id="err"></div>

<div id="banner">
  <span>✨</span>
  <span class="name" id="banner-name"></span>
  <button class="danger" onclick="stopDance()">⏹ Stop</button>
</div>

<div class="grid" style="margin-bottom: 4px">
  <button class="primary" onclick="post('/api/all/on')">💡 All on</button>
  <button onclick="post('/api/all/off')">🌑 All off</button>
</div>

<h2>Rooms</h2>
<div class="card" id="rooms"></div>

<h2>Lights</h2>
<div class="card" id="lights"></div>

<h2>Scenes</h2>
<div class="card" id="scenes"></div>

<h2>Dances</h2>
<div class="card" id="dances"></div>

<script>
const ICON = {
  chromatic_drift: "🌈", police: "🚔", ambulance: "🚑",
  thunderstorm: "⛈", bandari: "🎶", birthday: "🎂",
};
const CT = [["🕯",450],["💛",380],["⬜",300],["🔵",230],["☀",153]];
const COLORS = [["#ff2d2d",0],["#ff8c1a",25],["#ffd400",60],["#3ddc5b",120],
                ["#22d3ee",190],["#3b82f6",240],["#a855f7",280],["#ec4899",320]];
const BRI = [20, 40, 60, 80, 100];

let open = null;      // which light's controls are expanded
let busy = false;     // suppress polling while a click is in flight

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function showErr(msg) {
  const e = $("err");
  if (!msg) { e.classList.remove("show"); return; }
  e.textContent = msg;
  e.classList.add("show");
}

async function post(path) {
  busy = true;
  try {
    const r = await fetch(path, { method: "POST" });
    const data = await r.json().catch(() => ({}));
    if (!r.ok || data.ok === false) showErr(data.message || `Failed: ${path}`);
    else showErr(null);
  } catch (e) {
    showErr("Cannot reach mmhue");
  } finally {
    busy = false;
    await refresh();
  }
}

const startDance = (n) => post(`/api/dances/${n}/start`);
const stopDance   = () => post("/api/dances/stop");

function toggleOpen(id) {
  open = (open === id) ? null : id;
  render(window._state);
}

function render(s) {
  if (!s) return;
  window._state = s;

  $("summary").textContent = `${s.on_count} of ${s.total} lights on`;

  // Running dance banner
  const b = $("banner");
  if (s.dance_running) {
    $("banner-name").textContent = `${ICON[s.dance_running] || "🎵"} ${s.dance_running} is playing`;
    b.classList.add("show");
  } else {
    b.classList.remove("show");
  }

  // Rooms
  $("rooms").innerHTML = s.rooms.map(r => `
    <div class="row">
      <span class="dot ${r.on_count ? "on" : ""}"></span>
      <span class="name">${esc(r.name)}</span>
      <span class="meta">${r.on_count}/${r.total}</span>
      <button class="pill" onclick="post('/api/rooms/${r.id}/on')">on</button>
      <button class="pill" onclick="post('/api/rooms/${r.id}/off')">off</button>
    </div>`).join("") || `<div class="row"><span class="meta">No rooms</span></div>`;

  // Lights (tap a row to expand its controls)
  $("lights").innerHTML = s.lights.map(l => {
    const head = `
      <div class="row" onclick="toggleOpen('${l.id}')">
        <span class="dot ${l.on ? "on" : ""}"></span>
        <span class="name">${esc(l.name)}</span>
        <span class="meta">${l.on ? l.brightness + "%" : "off"}</span>
      </div>`;
    if (open !== l.id) return head;

    const bri = BRI.map(p => `
      <button class="pill ${l.on && Math.abs(p - l.brightness) <= 11 ? "active" : ""}"
              onclick="post('/api/lights/${l.id}/brightness/${p}')">${p}%</button>`).join("");
    const ct = l.supports_color_temp ? CT.map(([e, m]) => `
      <button class="pill" onclick="post('/api/lights/${l.id}/ct/${m}')">${e}</button>`).join("") : "";
    const col = l.supports_color ? COLORS.map(([hex, h]) => `
      <button class="swatch" style="background:${hex}"
              onclick="post('/api/lights/${l.id}/color/${h}')"></button>`).join("") : "";

    return head + `
      <div class="controls">
        <button class="pill ${l.on ? "primary" : ""}"
                onclick="post('/api/lights/${l.id}/toggle')">⏻ ${l.on ? "Off" : "On"}</button>
        ${bri}
      </div>
      ${ct ? `<div class="controls">${ct}</div>` : ""}
      ${col ? `<div class="controls">${col}</div>` : ""}`;
  }).join("") || `<div class="row"><span class="meta">No lights</span></div>`;

  // Scenes, grouped by room
  const byGroup = {};
  for (const sc of s.scenes) (byGroup[sc.group_name] ||= []).push(sc);
  $("scenes").innerHTML = Object.keys(byGroup).sort().map(g => `
    <div class="row" style="padding-bottom:4px"><span class="meta">${esc(g)}</span></div>
    <div class="controls">${byGroup[g].map(sc => `
      <button class="pill" onclick="post('/api/scenes/${sc.id}/activate')">${esc(sc.name)}</button>`).join("")}
    </div>`).join("") || `<div class="row"><span class="meta">No scenes</span></div>`;

  // Dances
  $("dances").innerHTML = `<div class="controls" style="padding-top:13px">` +
    s.dances.map(d => `
      <button class="pill ${d === s.dance_running ? "primary" : ""}"
              onclick="startDance('${d}')">${ICON[d] || "🎵"} ${d.replace(/_/g, " ")}</button>`).join("") +
    (s.dance_running ? `<button class="pill danger" onclick="stopDance()">⏹ Stop</button>` : "") +
    `</div>`;
}

async function refresh() {
  if (busy) return;
  try {
    const r = await fetch("/api/state");
    if (r.status === 401) { showErr("Wrong password — reload to retry."); return; }
    if (!r.ok) throw new Error();
    render(await r.json());
    showErr(null);
  } catch {
    showErr("Cannot reach mmhue");
  }
}

refresh();
setInterval(refresh, 2500);   // keeps the running-dance banner honest
</script>
</body>
</html>
