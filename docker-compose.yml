services:
  bot:
    build: .
    image: mmhue-bot:latest
    restart: unless-stopped
    env_file: .env
    environment:
      # Shared dance state. Bind-mounted so the bot, the CLI (docker exec), and
      # the host all read the same file. That is what lets the bot show a dance
      # started by cron, and lets a dance tell that another one is already running.
      MMHUE_STATE_DIR: /app/state
    volumes:
      - ./state:/app/state
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build: .
    image: mmhue-bot:latest
    restart: unless-stopped
    entrypoint: ["python", "-m", "mmhue.interfaces.web"]
    env_file: .env
    environment:
      MMHUE_STATE_DIR: /app/state
    # Same state dir as the bot: that is how a Stop here reaches a dance the
    # bot (or cron) is running, and vice versa.
    volumes:
      - ./state:/app/state
    ports:
      - "8080:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
